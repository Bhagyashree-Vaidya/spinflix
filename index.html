<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpinFlix Wheel</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-purple-100 to-pink-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full bg-white/80 backdrop-blur-sm rounded-3xl shadow-lg p-8 transform hover:scale-[1.02] transition-transform">
        <h1 class="text-4xl font-bold text-center mb-8 text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600">
            🎡 SpinFlix Wheel 🎡
        </h1>
        
        <!-- Input Section -->
        <div class="mb-8">
            <div class="flex gap-2 mb-4">
                <input type="text" id="optionInput" 
                    class="flex-1 px-4 py-3 border-2 border-purple-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-transparent transition-all"
                    placeholder="✨ Enter an option">
                <button onclick="addOption()" 
                    class="px-6 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-xl hover:from-purple-600 hover:to-pink-600 transition-all transform hover:scale-105 active:scale-95 shadow-lg hover:shadow-xl">
                    Add
                </button>
            </div>
            <div id="optionsList" class="space-y-2"></div>
        </div>

        <!-- Wheel Section -->
        <div class="wheel-container mb-8">
            <canvas id="wheel" width="300" height="300"></canvas>
            <!-- Only the Eyedropper Pin -->
            <div class="eyedropper-pin"></div>
        </div>

        <!-- Spin Button -->
        <div class="text-center">
            <button onclick="spinWheel()" 
                class="px-12 py-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-full hover:from-purple-600 hover:to-pink-600 disabled:opacity-50 transition-all transform hover:scale-105 active:scale-95 shadow-lg hover:shadow-xl text-xl font-bold"
                id="spinButton">
                SPIN
            </button>
        </div>

        <!-- Result Display -->
        <div id="result" class="mt-8 text-center text-2xl font-bold hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
